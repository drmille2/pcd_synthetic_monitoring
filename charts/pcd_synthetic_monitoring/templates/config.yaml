kind: ConfigMap
metadata:
  name: {{ include "pcd-synthetic.monitorConfigName" . }}
apiVersion: v1
data:
  00-monitors.toml: |+
    use_db_persistence = false
    log_level = "debug"

    [[monitor]]
    name = "{{ .Release.Name }} :: pcd :: nova"
    interval = 120

    [monitor.target]
    path = "/home/synth/scripts/openstack.sh"
    args = ["-s", "nova" {{- if .Values.readOnlyUser -}},"-r"{{- end }}]

    [[monitor.level]]
    name = "info"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "warn"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "error"
    reporters = ["postgresql"]

    [[monitor]]
    name = "{{ .Release.Name }} :: pcd :: neutron"
    interval = 120

    [monitor.target]
    path = "/home/synth/scripts/openstack.sh"
    args = ["-s", "neutron" {{- if .Values.readOnlyUser -}},"-r"{{- end }}]

    [[monitor.level]]
    name = "info"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "warn"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "error"
    reporters = ["postgresql"]

    [[monitor]]
    name = "{{ .Release.Name }} :: pcd :: cinder"
    interval = 120

    [monitor.target]
    path = "/home/synth/scripts/openstack.sh"
    args = ["-s", "cinder" {{- if .Values.readOnlyUser -}},"-r"{{- end }}]

    [[monitor.level]]
    name = "info"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "warn"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "error"
    reporters = ["postgresql"]

    [[monitor]]
    name = "{{ .Release.Name }} :: pcd :: glance"
    interval = 120

    [monitor.target]
    path = "/home/synth/scripts/openstack.sh"
    args = ["-s", "glance" {{- if .Values.readOnlyUser -}},"-r"{{- end }}]

    [[monitor.level]]
    name = "info"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "warn"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "error"
    reporters = ["postgresql"]
    {{- if not .Values.readOnlyUser -}}
    [[monitor]]
    name = "{{ .Release.Name }} :: pcd :: placement"
    interval = 120

    [monitor.target]
    path = "/home/synth/scripts/openstack.sh"
    args = ["-s", "placement"]

    [[monitor.level]]
    name = "info"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "warn"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "error"
    reporters = ["postgresql"]
    {{- end }}
    [[monitor]]
    name = "{{ .Release.Name }} :: pcd :: resmgr"
    interval = 120

    [monitor.target]
    path = "/home/synth/scripts/openstack.sh"
    args = ["-s", "resmgr" {{- if .Values.readOnlyUser -}},"-r"{{- end }}]

    [[monitor.level]]
    name = "info"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "warn"
    errors_to_escalate = 1
    reporters = ["postgresql"]

    [[monitor.level]]
    name = "error"
    reporters = ["postgresql"]

